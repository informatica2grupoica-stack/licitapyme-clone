# docker-compose.yml — Despliegue en el NOTEBOOK chileno (siempre encendido).
#
#   • app         → la app Next.js completa (front + API + descargador con Chromium).
#                   Sale a Mercado Público por la IP chilena del notebook → el descargador funciona.
#   • cloudflared → túnel de Cloudflare: publica la app en un link HTTPS público
#                   (https://app-licita.tudominio.com) sin abrir puertos del router.
#
# Uso EN EL NOTEBOOK:
#   1. cp .env.example .env   y rellena los valores reales (incluido CLOUDFLARE_TUNNEL_TOKEN).
#   2. docker compose up -d --build
#   3. Ver logs:  docker compose logs -f
#   4. Apagar:    docker compose down
#
# docker-compose lee automáticamente el archivo .env de esta carpeta tanto para
# sustituir ${VARIABLE} aquí (build args) como para inyectarlas al contenedor (env_file).
services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* deben existir EN BUILD (se incrustan en el bundle del front).
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_AUTOMATIZACION_PAUSADA: ${NEXT_PUBLIC_AUTOMATIZACION_PAUSADA}
        NEXT_PUBLIC_CRON_SECRET: ${NEXT_PUBLIC_CRON_SECRET}
    image: licitapyme-local
    container_name: licitapyme
    restart: unless-stopped          # vuelve solo tras reinicio/caída del notebook
    env_file: .env                   # inyecta TODAS las variables al runtime del contenedor
    ports:
      - "3003:3000"                  # opcional: probar en el propio notebook (http://localhost:3003)

  # Scheduler: dispara intake (cada 4h), prefiltro (+1h) y reintento de descarga de
  # documentos de Negocios (cada 2h) contra la app INTERNA (http://app:3000) con CRON_SECRET.
  # Vive en el notebook (IP chilena) porque la descarga sale a Mercado Público. Sobrevive
  # reinicios (restart: unless-stopped). Ver scheduler/scheduler.mjs para la agenda.
  scheduler:
    build:
      context: ./scheduler
    image: licitapyme-scheduler
    container_name: licitapyme-scheduler
    restart: unless-stopped
    env_file: .env                   # aporta CRON_SECRET y NEXT_PUBLIC_AUTOMATIZACION_PAUSADA
    environment:
      SCHEDULER_APP_URL: http://app:3000
      TZ: America/Santiago
    depends_on:
      - app

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: licitapyme-tunnel
    restart: unless-stopped
    # QUICK TUNNEL (gratis, sin dominio ni token). Cloudflare genera una URL pública
    # aleatoria https://<algo>.trycloudflare.com. Aparece en los logs del contenedor:
    #   docker compose logs cloudflared   → busca la línea "trycloudflare.com"
    # ⚠️ La URL cambia en cada reinicio del contenedor. Para un link fijo se necesita
    #    un dominio en Cloudflare (modo túnel con nombre + token).
    command: tunnel --no-autoupdate --url http://app:3000
    depends_on:
      - app
